name: daily

on:
  schedule:
    # 15:00 UTC = 08:00 America/Los_Angeles during PDT (07:00 during PST).
    - cron: '0 15 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append daily entry and push
        run: |
          DATE="$(TZ=America/Los_Angeles date '+%Y-%m-%d')"
          if grep -q "^- $DATE" log.md; then
            echo "Entry for $DATE already exists, skipping."
            exit 0
          fi
          echo "- $DATE" >> log.md
          git config user.name "tuvana1"
          git config user.email "170053779+tuvana1@users.noreply.github.com"
          git add log.md
          git commit -m "log: $DATE"
          git push
